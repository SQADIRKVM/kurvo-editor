name: Bun CI

concurrency:
  group: kurvo-ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      DATABASE_URL: "postgresql://kurvo:kurvo@localhost:5432/kurvo"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BETTER_AUTH_SECRET: "supersecret"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      UPSTASH_REDIS_REST_URL: "https://your-upstash-redis-url"
      UPSTASH_REDIS_REST_TOKEN: "your-upstash-redis-token"
      NEXT_PUBLIC_MARBLE_API_URL: "https://placeholder.example.com"
      MARBLE_WORKSPACE_KEY: "placeholder"
      FREESOUND_CLIENT_ID: "placeholder"
      FREESOUND_API_KEY: "placeholder"
      CLOUDFLARE_ACCOUNT_ID: "placeholder"
      R2_ACCESS_KEY_ID: "placeholder"
      R2_SECRET_ACCESS_KEY: "placeholder"
      R2_BUCKET_NAME: "placeholder"
      MODAL_TRANSCRIPTION_URL: "https://placeholder.example.com"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.11-${{ hashFiles('bun.lockb') }}

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build --filter @kurvo/web

      - name: Run tests
        working-directory: apps/web
        run: echo "No tests implemented yet"
        continue-on-error: true
